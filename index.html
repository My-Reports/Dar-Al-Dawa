<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAD Reporting System</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="mode-dark">

  <!-- ===== Topbar (Global) ===== -->
  <header class="topbar" aria-label="Top bar">
    <div class="brand" aria-label="Brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <div class="brand-text">
        <div class="brand-title" data-i18n="appName">DAD Reporting System</div>
        <div class="brand-sub" data-i18n="appSub">Marketing Department</div>
      </div>
    </div>

    <div class="topbar-center">
      <span class="time-badge" id="time-jo" aria-label="Jordan date and time">🇯🇴 --</span>
    </div>

    <div class="topbar-actions">
      <!-- ✅ Viewer actions (only visible in viewer screen) -->
      <div class="viewer-actions-top" id="viewerActionsTop" aria-label="Viewer actions">
        <button class="icon-btn icon-strong has-tooltip" id="reloadTopBtn" type="button" data-tooltip="Reload" aria-label="Reload">🔄</button>
        <button class="icon-btn icon-strong has-tooltip" id="newTabTopBtn" type="button" data-tooltip="New Tab" aria-label="Open in new tab">🔗</button>
      </div>

      <!-- 🌐 Language -->
      <div class="lang-menu" aria-label="Language menu">
        <button
          id="langToggle"
          class="icon-btn icon-strong has-tooltip"
          type="button"
          aria-label="Language"
          aria-haspopup="menu"
          aria-expanded="false"
          data-tooltip="Language"
        >🌐</button>

        <div id="langDropdown" class="lang-dropdown" role="menu" aria-label="Choose language">
          <button type="button" class="lang-item" data-lang="en" role="menuitemradio" aria-checked="true">
            <span class="lang-flag">🇺🇸</span>
            <span class="lang-text">English</span>
            <span class="lang-check" aria-hidden="true">✓</span>
          </button>

          <button type="button" class="lang-item" data-lang="ar" role="menuitemradio" aria-checked="false">
            <span class="lang-flag">🇸🇦</span>
            <span class="lang-text">العربية</span>
            <span class="lang-check" aria-hidden="true">✓</span>
          </button>
        </div>
      </div>

      <!-- 🎨 Theme -->
      <button
        class="icon-btn icon-strong has-tooltip"
        id="toggleThemeBtn"
        type="button"
        aria-label="Toggle theme"
        data-tooltip="Theme"
      >🌓</button>
    </div>
  </header>

  <!-- ================= LOGIN ================= -->
  <section id="login-screen" class="screen is-active screen-login" aria-label="Login screen">
    <div class="login-shell">
      <img src="Assets/DAD2.gif" class="login-logo" alt="DAD Logo" />

      <div class="login-card">
        <h1 class="login-title" data-i18n="mktDept">Marketing Department</h1>
        <p class="login-subtitle" data-i18n="reportingSystem">Reporting System</p>

        <label class="field-label" for="username" data-i18n="username">Username</label>
        <input type="text" id="username" value="mkt" readonly />

        <div class="info-chip">
          <span class="dot" aria-hidden="true"></span>
          <span data-i18n="userFixed">User Fixed – No Password Required</span>
        </div>

        <button id="login-btn" class="btn-primary" onclick="login()" data-i18n="enter">Enter Dashboard</button>
      </div>
    </div>

    <footer class="footer">
      <p><span data-i18n="poweredBy">Powered by</span> <span class="author">Eyad Sulayman</span></p>
    </footer>
  </section>

  <!-- ================= REPORTS ================= -->
  <section id="report-screen" class="screen screen-reports" aria-label="Reports screen">
    <div class="reports-layout">
      <div class="reports-header">
        <div class="reports-title">
          <h2 data-i18n="reportsTitle">Reports</h2>
          <p data-i18n="reportsSub">Choose a report to open</p>
        </div>

        <img src="Assets/50.gif" class="top-gif" alt="" />

        <button class="btn-ghost" onclick="logout()">
          <span data-i18n="logout">Logout</span>
        </button>
      </div>

      <!-- Scroll only inside list -->
      <div class="reports-scroll" aria-label="Reports list">
        <div class="reports-grid" id="reportsGrid">
          <button class="report-card" data-key="ims"
            data-url="https://app.powerbi.com/view?r=eyJrIjoiZTczODU1YWUtZDQzOS00OWU3LTkzOWUtZjE5Y2YxMWUzZTlkIiwidCI6IjhiNjAyNDRiLTFiZGQtNDk4YS04ODY3LTljNzJhNGQ5NzFhMCIsImMiOjl9"
            data-i18n="r_ims">IMS Overall Analysis</button>

          <button class="report-card" data-key="tms"
            data-url="https://app.powerbi.com/view?r=eyJrIjoiOWYxNTliMjAtODNjZC00Yjg0LTg2MGMtYTI4NDBkMDYzZGY5IiwidCI6IjhiNjAyNDRiLTFiZGQtNDk4YS04ODY3LTljNzJhNGQ5NzFhMCIsImMiOjl9"
            data-i18n="r_tms">TMS Overall Analysis</button>

          <button class="report-card" data-key="iqvia"
            data-url="https://app.powerbi.com/view?r=eyJrIjoiYWRjYWVjNDEtOGE2My00YjIwLTllNDEtYTEyMWYxZjBmNWUwIiwidCI6IjhiNjAyNDRiLTFiZGQtNDk4YS04ODY3LTljNzJhNGQ5NzFhMCIsImMiOjl9"
            data-i18n="r_iqvia">IQVIA – MIDAS</button>

          <button class="report-card" data-key="pharma"
            data-url="https://app.powerbi.com/view?r=eyJrIjoiOGYxNDJjNjMtYzVlNi00ZjRkLTg5NzYtZGJjZjM4NzVhMDMwIiwidCI6IjhiNjAyNDRiLTFiZGQtNDk4YS04ODY3LTljNzJhNGQ5NzFhMCIsImMiOjl9"
            data-i18n="r_pharma">AMS – Pharma</button>

          <button class="report-card" data-key="medical"
            data-url="https://app.powerbi.com/view?r=eyJrIjoiMDQzMWNhYzctNmU5Zi00NTQ2LWIzM2UtMTQ5MTQyMTE1OWRlIiwidCI6IjhiNjAyNDRiLTFiZGQtNDk4YS04ODY3LTljNzJhNGQ5NzFhMCIsImMiOjl9"
            data-i18n="r_medical">AMS – Medical</button>

          <!-- ✅ Same design, soft highlight only -->
          <button class="report-card highlight-soft" data-key="ims2025"
            data-url="https://app.powerbi.com/view?r=eyJrIjoiNTc1MWEyMTgtODVkYS00ZTg5LTgzNGEtNjkxOTEyMDVmODllIiwidCI6IjhiNjAyNDRiLTFiZGQtNDk4YS04ODY3LTljNzJhNGQ5NzFhMCIsImMiOjl9"
            data-i18n="r_ims2025">2025 IMS Overall Analysis</button>
        </div>
      </div>

      <footer class="footer footer-inline">
        <p><span data-i18n="poweredBy">Powered by</span> <span class="author">Eyad Sulayman</span></p>
      </footer>
    </div>
  </section>

  <!-- ================= VIEWER ================= -->
  <section id="viewer-screen" class="screen screen-viewer" aria-label="Viewer screen">
    <!-- ✅ Floating glassy menu with dropdown -->
    <div class="fab-menu" aria-label="Quick menu">
      <button class="fab-btn" id="viewerMenuBtn" type="button" aria-haspopup="menu" aria-expanded="false" title="Menu">☰</button>
      <div class="fab-dropdown" id="viewerMenuDropdown" role="menu" aria-label="Reports menu"></div>
    </div>

    <div class="viewer-shell">
      <div class="loading-overlay" id="viewerLoading" aria-live="polite">
        <div class="spinner"></div>
        <div class="loading-text">
          <div class="loading-title" data-i18n="loading">Loading report…</div>
          <div class="loading-sub" data-i18n="loadingSub">Please wait a moment</div>
        </div>
      </div>

      <iframe id="report-frame" allowfullscreen></iframe>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
